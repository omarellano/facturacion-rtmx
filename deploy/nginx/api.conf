# Backend API: api.rotulatepublicidad.com
server {
    listen 80;
    server_name api.rotulatepublicidad.com;

    # Redirigir HTTP a HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.rotulatepublicidad.com;

    # SSL (Certbot llenará estas rutas)
    ssl_certificate /etc/letsencrypt/live/api.rotulatepublicidad.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.rotulatepublicidad.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Limitar tamaño de body (para las peticiones JSON)
    client_max_body_size 10M;

    # Timeout largo para Puppeteer (los robots pueden tardar)
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Headers de seguridad
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
}
